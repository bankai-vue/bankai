name: Update Visual Snapshots

# Regenerates the per-OS visual baselines in the real CI env (local macOS images
# don't match the runners). Two ways to trigger:
#   - Manually: Actions -> Update Visual Snapshots -> Run workflow (pick a branch).
#   - On a PR: comment `/update-snapshots` (authorized users only).
# Each OS uploads its snapshots as an artifact; download them and commit into the PR.
on:
  workflow_dispatch:
  issue_comment:
    types:
      - created

permissions:
  contents: read # to fetch code (actions/checkout)

jobs:
  update:
    # Always for manual dispatch; for PR comments only `/update-snapshots` from OWNER/MEMBER/COLLABORATOR.
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          (github.event.issue.pull_request &&
           startsWith(github.event.comment.body, '/update-snapshots') &&
           contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)) }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    timeout-minutes: 20
    name: 'Update snapshots: ${{ matrix.os }}'
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # For a PR comment, check out the PR head; for manual dispatch, the chosen ref.
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || github.ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set node version to 26
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26.5.0

      - name: Install deps
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Update snapshots
        shell: bash
        run: pnpm run test:e2e --update-snapshots=all --grep @visual

      - name: Upload snapshots
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: visual-snapshots-${{ runner.os }}
          path: 'e2e/**/*-snapshots/**'
          retention-days: 7

name: Deploy Docs

on:
  push:
    branches:
      - main
    # Redeploy when the site, any published package (a new component changes the
    # demo), or the toolchain/lockfile changes. Also manually via the Actions tab.
    paths:
      - 'docs/**'
      - 'packages/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

# Least privilege + the tokens GitHub Pages deployment requires.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deployment at a time; don't cancel a running deploy (let it finish).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: 'Build docs (SSG)'
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set node version to 26
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26.5.0
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install

      # Docs consume the workspace packages from dist/ (core + themes + the nuxt
      # module), so build them before generating the site.
      - name: Build packages
        run: pnpm run build

      - name: Generate static site
        # NUXT_APP_BASE_URL sets app.baseURL for the project page at /bankai/.
        env:
          NUXT_APP_BASE_URL: /bankai/
        run: pnpm --filter @bankai-vue/docs run generate

      # GitHub Pages skips paths that start with `_` (Jekyll); Nuxt emits `_nuxt/`.
      - name: Disable Jekyll processing
        run: touch docs/.output/public/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/.output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: 'Deploy to GitHub Pages'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

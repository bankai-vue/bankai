name: Release

on:
  push:
    branches:
      - main

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    # Never run on forks; stay dormant until an NPM_TOKEN secret exists.
    # No release should happen before the first publish is intended — adding the
    # NPM_TOKEN secret is the single switch that activates this workflow.
    if: ${{ github.repository == 'bankai-vue/bankai' }}
    env:
      NPM_TOKEN_SET: ${{ secrets.NPM_TOKEN != '' }} # secrets are allowed in job-level env
    permissions:
      contents: write # to create the version commit/tag and GitHub release
      pull-requests: write # to open/update the "release: version packages" PR
      id-token: write # for npm provenance (OIDC)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Release
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set node version to 26
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install deps
        if: ${{ env.NPM_TOKEN_SET == 'true' }}
        run: pnpm install

      - name: Create release PR or publish
        if: ${{ env.NPM_TOKEN_SET == 'true' }}
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm run version
          publish: pnpm run release
          commit: 'release: version packages'
          title: 'release: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'

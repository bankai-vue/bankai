name: CI

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

permissions:
  contents: read # to fetch code (actions/checkout)

concurrency:
  # PRs group by PR number so a new push cancels the previous run.
  # Everything else (push to main, merge_group) gets a unique group via
  # run_id, so main-branch pipelines are never canceled by a following commit.
  group: ci-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node_version: [24, 26]
      fail-fast: false
    timeout-minutes: 15

    name: 'Test: node-${{ matrix.node_version }}, ${{ matrix.os }}'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set node version to ${{ matrix.node_version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node_version }}
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install

      - name: Build
        run: pnpm run build

      # Unit/component tests run in a real browser (Vitest Playwright provider).
      - name: Resolve Playwright version
        id: pw
        shell: bash
        run: echo "version=$(node -e "console.log(require('playwright/package.json').version)")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/ms-playwright
            ~/Library/Caches/ms-playwright
            ~\AppData\Local\ms-playwright
          key: playwright-all-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps

      # `playwright install-deps` shells out to apt-get, which intermittently hangs on
      # hosted runners (stuck lock / slow mirror). A healthy run takes <60s; a hang otherwise
      # eats the whole job budget. `timeout` caps each attempt at 3x the healthy max (step-level
      # timeout-minutes would kill the whole retry loop on the first hang), then we retry.
      # Worst-case loop is 3x180s + 2x10s ≈ 9m20s, so timeout-minutes: 10 never cuts a retry short.
      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true' && runner.os == 'Linux'
        timeout-minutes: 10
        run: |
          for i in 1 2 3; do
            timeout 180 pnpm exec playwright install-deps && exit 0
            echo "install-deps attempt $i failed or timed out, retrying in 10s…"; sleep 10
          done
          exit 1

      - name: Test
        run: pnpm run test

  e2e:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    timeout-minutes: 15
    name: 'E2E: ${{ matrix.os }}'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set node version to 26
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26.5.0
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install

      - name: Resolve Playwright version
        id: pw
        shell: bash
        run: echo "version=$(node -e "console.log(require('playwright/package.json').version)")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/ms-playwright
            ~/Library/Caches/ms-playwright
            ~\AppData\Local\ms-playwright
          key: playwright-all-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps

      # See the note in the `test` job: apt-get via install-deps can hang on hosted runners.
      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true' && runner.os == 'Linux'
        timeout-minutes: 10
        run: |
          for i in 1 2 3; do
            timeout 180 pnpm exec playwright install-deps && exit 0
            echo "install-deps attempt $i failed or timed out, retrying in 10s…"; sleep 10
          done
          exit 1

      - name: Run e2e tests
        run: pnpm run test:e2e

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ runner.os }}
          path: |
            playwright-report/
            test-results/
          retention-days: 30

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: 'Lint & Types: ubuntu-latest'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set node version to 26
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26.5.0
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install

      # Build packages first: the shared `tsgo` typecheck resolves cross-package type imports
      # (e.g. @bankai-vue/nuxt's `import type { BankaiConfig } from '@bankai-vue/core'`) against
      # each dependency's built `dist/*.d.ts`. core is SFC-based so it is excluded from tsgo's own
      # compile — without its build there is no declaration to resolve. Matches the test/docs jobs.
      - name: Build
        run: pnpm run build

      - name: Lint
        run: pnpm run lint --format=github

      - name: Type check
        run: pnpm run typecheck

      - name: Check formatting
        run: pnpm run format:check

  # The docs Nuxt app is excluded from the shared build/typecheck/lint jobs (its tsconfig
  # extends the generated .nuxt/tsconfig.json, absent until a `nuxi` run). Validate it here so a
  # broken docs page fails the PR instead of the post-merge deploy-docs.yml on main.
  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: 'Docs build (SSG)'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set node version to 26
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26.5.0
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install

      # Docs consume the workspace packages from dist/, so build them before type-checking /
      # generating the site (mirrors deploy-docs.yml). Generate stays at base '/' — the /bankai/
      # base path is a deploy-time concern, not needed to prove the site builds.
      - name: Build packages
        run: pnpm run build

      - name: Type check docs
        run: pnpm --filter @bankai-vue/docs run typecheck

      - name: Generate static site
        run: pnpm --filter @bankai-vue/docs run generate

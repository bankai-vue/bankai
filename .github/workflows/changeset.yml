name: Changeset

on:
  pull_request:
  merge_group:

permissions:
  contents: read # to fetch code (actions/checkout)

jobs:
  changeset:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Changeset
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history so changesets can diff against the base branch

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set node version to 26
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26.4.0
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install

      # Fails when a publishable package changed without a changeset. Non-release
      # changes (docs, ci, chore) touch no publishable package, so they pass; if
      # one genuinely needs no release, add an empty changeset (changeset add --empty).
      - name: Require a changeset
        env:
          BASE: ${{ github.base_ref || 'main' }}
        run: |
          git fetch --no-tags origin "+refs/heads/$BASE:refs/remotes/origin/$BASE"
          pnpm changeset status --since="origin/$BASE"

name: Changeset

on:
  pull_request:
  merge_group:

permissions:
  contents: read # to fetch code (actions/checkout)

jobs:
  changeset:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Changeset
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0 # full history so changesets can diff against the base branch

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set node version to 26
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26.5.0
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install

      # Fails when a publishable package changed without a changeset. Non-release
      # changes (docs, ci, chore) touch no publishable package, so they pass; if
      # one genuinely needs no release, add an empty changeset (changeset add --empty).
      - name: Require a changeset
        env:
          BASE: ${{ github.base_ref || 'main' }}
        run: |
          git fetch --no-tags origin "+refs/heads/$BASE:refs/remotes/origin/$BASE"
          pnpm changeset status --since="origin/$BASE"

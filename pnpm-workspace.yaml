packages:
  - packages/*
  - playground
  - docs

# Beta Vue (3.6.0-beta) is intentionally installed against a ^3.5 peer range, so
# peer mismatches are warnings, not failures (SPEC.md §4.11/§6).
strictPeerDependencies: false
autoInstallPeers: true
peerDependencyRules:
  allowedVersions:
    vue: 3.6.0-beta.17

# Approved native build scripts (pnpm only runs postinstall for these).
# Kept to a deliberately short, audited list (SPEC.md §4.13).
#  - esbuild: platform binary for Vite/Vitest
#  - @parcel/watcher: native file watcher pulled in by the Nuxt toolchain
allowBuilds:
  '@parcel/watcher': true
  esbuild: true

# Single source of version truth for the workspace (pnpm catalog).
# Packages reference these via "catalog:" instead of hardcoding versions.
# Versions verified against npm on 2026-06-30 — see SPEC.md §6 (currency).
catalog:
  # Vue — develop/test against the 3.6 beta (Vapor-complete); packages still
  # declare a peer of ^3.5.0 so stable consumers work (SPEC.md §4.11/§6).
  vue: 3.6.0-beta.17

  # TypeScript hybrid (SPEC.md §4.8):
  #  - typescript 6.x is the last JS-based release; it provides the compiler
  #    API that vue-tsc + editors still need.
  #  - @typescript/native-preview provides `tsgo` (TS 7.0, Go) for fast .ts checks.
  typescript: 6.0.3
  '@typescript/native-preview': 7.0.0-dev.20260630.1
  vue-tsc: 3.3.6

  # Build / bundling (rolldown-based; fits the oxc/voidzero stack).
  tsdown: 0.22.3
  unplugin-vue: 7.2.0
  vite: 8.1.2
  '@vitejs/plugin-vue': 6.0.7

  # Test stack (SPEC.md §4.14).
  vitest: 4.1.9
  '@vitest/browser-playwright': 4.1.9
  playwright: 1.61.1
  '@playwright/test': 1.61.1

  # Lint / format — oxc toolchain.
  oxlint: 1.72.0
  oxfmt: 0.57.0

  # Release (SPEC.md §4.14).
  '@changesets/cli': 2.31.0

  # Nuxt module toolchain.
  nuxt: 4.4.8
  '@nuxt/kit': 4.4.8
  '@nuxt/module-builder': 1.0.2


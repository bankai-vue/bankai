packages:
  - packages/*
  - playground
  - docs

# Beta Vue (3.6.0-beta) is intentionally installed against a ^3.5 peer range, so
# peer mismatches are warnings, not failures (SPEC.md §4.11/§6).
strictPeerDependencies: false
autoInstallPeers: true
peerDependencyRules:
  allowedVersions:
    vue: 3.6.0-beta.17

# Approved native build scripts (pnpm only runs postinstall for these).
# Kept to a deliberately short, audited list (SPEC.md §4.13).
#  - @parcel/watcher: native file watcher pulled in by the Nuxt toolchain
# NOTE: esbuild's postinstall is intentionally NOT allowed. Two esbuild majors
# coexist (vite 7 via Nuxt + vite 8), and esbuild's install-time binary
# validation cross-checks the wrong version and fails (seen in CI). esbuild
# loads its binary from the `@esbuild/*` optional deps at runtime, so the build
# script isn't needed.
allowBuilds:
  '@parcel/watcher': true
  esbuild: false

# Single source of version truth for the workspace (pnpm catalog).
# Packages reference these via "catalog:" instead of hardcoding versions.
# Versions verified against npm on 2026-06-30 — see SPEC.md §6 (currency).
catalog:
  # Vue — develop/test against the 3.6 beta (Vapor-complete); packages still
  # declare a peer of ^3.5.0 so stable consumers work (SPEC.md §4.11/§6).
  vue: 3.6.0-beta.17

  # vue-router — an OPTIONAL peer of core (BankaiLink's first-class internal-link
  # target). Only used for the `@bankai-vue/core/vue-router` types augmentation and
  # runtime detection; core never imports it on the router-free `<a>` path.
  vue-router: 5.1.0

  # TypeScript hybrid (SPEC.md §4.8):
  #  - typescript 6.x is the last JS-based release; it provides the compiler
  #    API that vue-tsc + editors still need.
  #  - @typescript/native-preview provides `tsgo` (TS 7.0, Go) for fast .ts checks.
  typescript: 6.0.3
  '@typescript/native-preview': 7.0.0-dev.20260707.2
  '@types/node': 26.1.1 # dev-only types; 26.x is safely above the >=24.11 node floor
  vue-tsc: 3.3.7
  # Docs props/slots/events tables are generated from core's source SFCs by
  # `scripts/generate-component-meta.ts`. Kept in lockstep with vue-tsc (same
  # @vue/language-tools release line).
  vue-component-meta: 3.3.7

  # Build / bundling (rolldown-based; fits the oxc/voidzero stack).
  tsdown: 0.22.4
  unplugin-vue: 7.2.0
  vite: 8.1.4
  '@vitejs/plugin-vue': 6.0.8

  # Tailwind CSS — dev-only in this workspace: the playground uses it to exercise
  # `@bankai-vue/theme-tailwind`'s token remap. `@bankai-vue/theme-tailwind` declares
  # `tailwindcss` as a peer (range, not this pin); this pin is what the playground installs.
  tailwindcss: 4.3.2
  '@tailwindcss/vite': 4.3.2

  # Test stack (SPEC.md §4.14).
  vitest: 4.1.10
  '@vitest/browser-playwright': 4.1.10
  playwright: 1.61.1
  '@playwright/test': 1.61.1

  # Lint / format — oxc toolchain.
  oxlint: 1.74.0
  oxlint-tsgolint: 0.25.0 # enables `options.typeAware` type-aware lint rules
  oxfmt: 0.59.0

  # Release (SPEC.md §4.14).
  '@changesets/cli': 2.31.0

  # Monorepo script runner — `run-s` for the `preflight` chain.
  npm-run-all2: 9.0.2

  # Nuxt module toolchain.
  nuxt: 4.4.8
  '@nuxt/kit': 4.4.8
  '@nuxt/module-builder': 1.0.2

# Trusted, exact-pinned tooling (+ their platform bindings) is exempt from the
# release-age delay so Renovate bumps can be installed immediately. Matched by
# name/glob rather than exact version, so these survive version bumps.
minimumReleaseAgeExclude:
  - oxfmt
  - '@oxfmt/*'
  - oxlint
  - '@oxlint/*'
  - oxlint-tsgolint
  - '@oxlint-tsgolint/*'
  - '@typescript/native-preview'
  - '@typescript/native-preview-*'
  - vue-tsc
  - '@vue/language-core'
  - vite

# Backport of sxzz/rolldown-plugin-dts#272: adds `allowNonTsExtensions` so `.vue`
# entries load into the dts program deterministically (fixes the intermittent
# "Unable to load file …/*.vue from the program" build failure, upstream #188).
# Remove this patch once a released rolldown-plugin-dts (pulled via tsdown)
# includes the fix.
patchedDependencies:
  rolldown-plugin-dts@0.27.4: patches/rolldown-plugin-dts@0.27.4.patch
